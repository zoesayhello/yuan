<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>國字手寫小老師</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: #fffaf5;
            font-family: 'Noto Sans TC', sans-serif;
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .app-container {
            width: 100%;
            max-width: 440px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px 0;
        }

        .card {
            background: white;
            border-radius: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
            border: 6px solid white;
            outline: 4px solid #ffedd5;
            width: 95%;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .main-layout {
            display: flex;
            width: 100%;
            padding: 10px;
            gap: 10px;
            align-items: flex-start;
        }

        .writing-zone {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .answer-zone {
            width: 140px; /* 稍微加寬以容納更大的字 */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #fff7ed;
            border-radius: 1.5rem;
            padding: 15px 5px;
            min-height: 280px;
        }

        .tian-grid {
            position: relative;
            background-color: #fff;
            border: 4px solid #fb923c;
            border-radius: 20px;
            box-shadow: 0 10px 25px -5px rgba(251, 146, 60, 0.1);
            width: 260px;
            height: 260px;
            touch-action: none;
        }

        .tian-grid::before {
            content: ""; position: absolute; top: 50%; left: 5%; right: 5%; height: 0;
            border-top: 2px dashed #fdba74; pointer-events: none; z-index: 1;
        }
        .tian-grid::after {
            content: ""; position: absolute; left: 50%; top: 5%; bottom: 5%; width: 0;
            border-left: 2px dashed #fdba74; pointer-events: none; z-index: 1;
        }

        canvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10;
        }

        .btn-base {
            padding: 0.8rem;
            font-weight: 900;
            border-radius: 1rem;
            transition: all 0.1s;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: none;
            width: 100%;
            user-select: none;
        }
        .btn-orange { background: #f97316; color: white; box-shadow: 0 4px 0 #ea580c; }
        .btn-orange:active { transform: translateY(4px); box-shadow: 0 0px 0 #ea580c; }
        
        .btn-gray { background: #94a3b8; color: white; box-shadow: 0 4px 0 #64748b; }
        .btn-gray:active { transform: translateY(4px); box-shadow: 0 0px 0 #64748b; }

        .btn-outline { 
            background: white; border: 2px solid #fb923c; color: #f97316; 
            box-shadow: 0 4px 0 #fb923c;
        }
        .btn-outline:active { transform: translateY(4px); box-shadow: 0 0px 0 #fb923c; }

        .phonetic-bracket { color: #f97316; font-weight: bold; }
        
        /* 正確答案字體：放大一倍 */
        .big-answer-char {
            font-size: 8rem; /* 從原本的 5rem 左右放大到 8rem */
            line-height: 1;
            font-family: serif;
            color: #1e293b;
            margin: 10px 0;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="card">
            <div class="bg-gradient-to-r from-orange-400 to-orange-500 w-full py-4 px-4 text-center">
                <h1 class="text-white text-xl font-black m-0 tracking-tight">生字造語挑戰</h1>
                <p class="text-orange-100 text-xs m-0">看拼音，寫出正確的字</p>
            </div>

            <div class="pt-4 pb-2 w-full flex flex-col items-center">
                <span class="text-[10px] text-orange-400 font-black tracking-[0.3em]">CHALLENGE</span>
                <div id="target-phrase" class="text-3xl font-serif text-slate-800 h-16 w-full flex items-center justify-center text-center">
                    載入中...
                </div>
            </div>

            <div class="main-layout">
                <div class="writing-zone">
                    <div class="tian-grid">
                        <canvas id="writeCanvas"></canvas>
                    </div>
                </div>

                <div id="answerDisplay" class="answer-zone hidden">
                    <span class="text-[10px] text-slate-400 font-bold">正確國字</span>
                    <div id="correctWord" class="big-answer-char"></div>
                    <div class="text-[10px] text-slate-400 font-bold mt-2">部首</div>
                    <div id="correctRadical" class="text-lg font-black text-orange-600"></div>
                    
                    <button id="closeModal" class="btn-base btn-orange text-xs py-2 mt-4">
                        我學會了
                    </button>
                </div>
            </div>

            <div class="px-6 pb-8 w-full flex flex-col items-center gap-3">
                <div class="flex gap-3 w-full">
                    <button id="clearBtn" class="btn-base btn-gray text-base flex-1">清除</button>
                    <button id="nextBtn" class="btn-base btn-orange text-base flex-1">下一個</button>
                </div>
                <button id="showAnswer" class="btn-base btn-outline text-lg w-full">
                    💡 點我看答案與部首
                </button>
            </div>
        </div>

        <div class="mt-4 text-slate-400 font-bold bg-white/80 backdrop-blur px-6 py-2 rounded-full shadow-sm border border-orange-100">
            已完成挑戰：<span id="count" class="text-orange-500 text-xl">0</span> 個字
        </div>
    </div>

    <script>
        const quizData = [
            { char: '船', pinyin: 'ㄔㄨㄢˊ', prefix: '小', suffix: '', radical: '舟部' },
            { char: '臉', pinyin: 'ㄌㄧㄢˇ', prefix: '笑', suffix: '', radical: '肉部' },
            { char: '雲', pinyin: 'ㄩㄣˊ', prefix: '白', suffix: '', radical: '雨部' },
            { char: '游', pinyin: 'ㄧㄡˊ', prefix: '向前', suffix: '', radical: '水部' },
            { char: '功', pinyin: 'ㄍㄨㄥ', prefix: '', suffix: '課', radical: '力部' },
            { char: '紙', pinyin: 'ㄓˇ', prefix: '報', suffix: '', radical: '糸部' },
            { char: '勇', pinyin: 'ㄩㄥˇ', prefix: '', suffix: '敢', radical: '力部' },
            { char: '餅', pinyin: 'ㄅㄧㄥˇ', prefix: '芝麻', suffix: '', radical: '食部' },
            { char: '澡', pinyin: 'ㄗㄠˇ', prefix: '洗', suffix: '', radical: '水部' },
            { char: '橋', pinyin: 'ㄑㄧㄠˊ', prefix: '一座', suffix: '', radical: '木部' },
            { char: '鹿', pinyin: 'ㄌㄨˋ', prefix: '梅花', suffix: '', radical: '鹿部' },
            { char: '獅', pinyin: 'ㄕ', prefix: '', suffix: '子', radical: '犬部' },
            { char: '救', pinyin: 'ㄐㄧㄡˋ', prefix: '求', suffix: '', radical: '攴部' },
            { char: '假', pinyin: 'ㄐㄧㄚˋ', prefix: '放', suffix: '', radical: '人部' },
            { char: '蜂', pinyin: 'ㄈㄥ', prefix: '蜜', suffix: '', radical: '虫部' },
            { char: '彩', pinyin: 'ㄘㄞˇ', prefix: '', suffix: '虹', radical: '彡部' }, 
            { char: '蜻', pinyin: 'ㄑㄧㄥ', prefix: '', suffix: '蜓', radical: '虫部' },
            { char: '日', pinyin: 'ㄖˋ', prefix: '', suffix: '記', radical: '日部' },
            { char: '月', pinyin: 'ㄩㄝˋ', prefix: '', suffix: '亮', radical: '月部' },
            { char: '山', pinyin: 'ㄕㄢ', prefix: '高', suffix: '', radical: '山部' },
            { char: '木', pinyin: 'ㄇㄨˋ', prefix: '', suffix: '頭', radical: '木部' },
            { char: '水', pinyin: 'ㄕㄨㄟˇ', prefix: '', suffix: '流', radical: '水部' },
            { char: '人', pinyin: 'ㄖㄣˊ', prefix: '', suffix: '類', radical: '人部' },
            { char: '手', pinyin: 'ㄕㄡˇ', prefix: '雙', suffix: '', radical: '手部' },
            { char: '門', pinyin: 'ㄇㄣˊ', prefix: '大', suffix: '', radical: '門部' },
            { char: '龍', pinyin: 'ㄌㄨㄥˊ', prefix: '恐', suffix: '', radical: '龍部' }
        ];

        const canvas = document.getElementById('writeCanvas');
        const ctx = canvas.getContext('2d');
        const clearBtn = document.getElementById('clearBtn');
        const nextBtn = document.getElementById('nextBtn');
        const phraseDisplay = document.getElementById('target-phrase');
        const countDisplay = document.getElementById('count');
        const showAnswerBtn = document.getElementById('showAnswer');
        const answerZone = document.getElementById('answerDisplay');
        const correctWordText = document.getElementById('correctWord');
        const correctRadicalText = document.getElementById('correctRadical');
        const closeModal = document.getElementById('closeModal');

        let isDrawing = false;
        let practiceCount = 0;
        let currentQuiz = null;

        function setupCanvas() {
            const dpr = window.devicePixelRatio || 1;
            const rect = canvas.getBoundingClientRect();
            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            ctx.scale(dpr, dpr);
            ctx.strokeStyle = '#334155';
            ctx.lineWidth = 5;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
        }

        function pickNewQuestion() {
            const randomIndex = Math.floor(Math.random() * quizData.length);
            currentQuiz = quizData[randomIndex];
            // 題目邏輯：前綴 + (注音) + 後綴
            phraseDisplay.innerHTML = `${currentQuiz.prefix}<span class="phonetic-bracket">（${currentQuiz.pinyin}）</span>${currentQuiz.suffix}`;
            clearCanvas();
            answerZone.classList.add('hidden');
        }

        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            let clientX, clientY;
            if (e.touches && e.touches.length > 0) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            return {
                x: clientX - rect.left,
                y: clientY - rect.top
            };
        }

        function startDrawing(e) {
            isDrawing = true;
            const pos = getPos(e);
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
        }

        function draw(e) {
            if (!isDrawing) return;
            const pos = getPos(e);
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
        }

        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        window.addEventListener('mouseup', () => isDrawing = false);

        canvas.addEventListener('touchstart', (e) => {
            if(e.target === canvas) e.preventDefault();
            startDrawing(e);
        }, { passive: false });
        canvas.addEventListener('touchmove', (e) => {
            if(e.target === canvas) e.preventDefault();
            draw(e);
        }, { passive: false });
        canvas.addEventListener('touchend', () => isDrawing = false);

        clearBtn.addEventListener('click', clearCanvas);
        nextBtn.addEventListener('click', () => {
            practiceCount++;
            countDisplay.textContent = practiceCount;
            pickNewQuestion();
        });

        showAnswerBtn.addEventListener('click', () => {
            correctWordText.textContent = currentQuiz.char;
            correctRadicalText.textContent = currentQuiz.radical;
            answerZone.classList.remove('hidden');
        });

        closeModal.addEventListener('click', () => {
            answerZone.classList.add('hidden');
        });

        window.onload = () => {
            setupCanvas();
            pickNewQuestion();
        };
        window.addEventListener('resize', setupCanvas);
    </script>
</body>

</html>
